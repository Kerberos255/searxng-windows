use_default_settings: true

general:
  debug: false
  instance_name: "Local SearXNG"

server:
  bind_address: "127.0.0.1"
  port: 8888
  secret_key: "CHANGE_ME_GENERATE_WITH_SECRETS_TOKEN_URLSAFE"
  base_url: false
  limiter: false
  public_instance: false
  image_proxy: false
  method: "GET"

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

# Uncomment this block if direct outbound access to search engines times out.
# outgoing:
#   request_timeout: 10.0
#   max_request_timeout: 20.0
#   extra_proxy_timeout: 10
#   proxies:
#     all://:
#       - http://127.0.0.1:10808

ui:
  static_use_hash: true
  default_locale: "zh-Hans-CN"
  query_in_title: false
  infinite_scroll: false

engines:
  # Optional API-backed search pool. It is disabled by default.
  # Set disabled: false and add keys to config/api-pool.env to enable it.
  - name: api pool
    engine: api_pool
    disabled: true
    enable_http: true
    categories:
      - general
      - web

  - name: duckduckgo
    disabled: true
  - name: duckduckgo images
    disabled: true
  - name: duckduckgo videos
    disabled: true
  - name: duckduckgo news
    disabled: true
