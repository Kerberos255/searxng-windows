name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PowerShell syntax
        shell: pwsh
        run: |
          $scripts = @(
            Get-Item -Path install-searxng-windows.ps1
            Get-ChildItem -Path scripts -Filter *.ps1
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($script.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              Write-Error "PowerShell syntax errors in $($script.FullName): $($errors | Out-String)"
            }
          }

      - name: Check Python syntax
        shell: pwsh
        run: |
          $pythonFiles = @(
            "skill/scripts/search.py"
            "skill/scripts/searxng.py"
            "patches/api_pool.py"
          )
          $pythonFiles += Get-ChildItem -Path api_pool -Filter *.py -Recurse | ForEach-Object { $_.FullName }
          python -m py_compile @pythonFiles

      - name: Run API Pool tests
        shell: pwsh
        run: |
          python -m pip install -r api_pool/requirements.txt
          python -m unittest discover -s api_pool/tests -v
